apiVersion: v1
kind: Secret
metadata:
  name: fitness-secrets
  namespace: fitness-tracker
type: Opaque
stringData:
  # ─── Replace these values with your real secrets ──────────────────────────
  # In production use: kubectl create secret generic fitness-secrets --from-env-file=.env
  JWT_SECRET: "change-me-to-a-real-secret-at-least-32-bytes"
  DB_URL: "jdbc:postgresql://your-neon-host/fitness_db"
  DB_USERNAME: "your-db-user"
  DB_PASSWORD: "your-db-password"
  REDIS_HOST: "your-upstash-host"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "your-redis-password"
  REDIS_SSL: "true"
  MONGODB_URI: "mongodb+srv://user:pass@cluster.mongodb.net/fitness_ai_logs"
  GROQ_API_KEY: "your-groq-api-key"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-config
  namespace: fitness-tracker
data:
  JWT_EXPIRATION_MS: "86400000"
  USER_SERVICE_URL: "http://user-service:8081"
  WORKOUT_SERVICE_URL: "http://workout-service:8082"
  NUTRITION_SERVICE_URL: "http://nutrition-service:8083"
  ANALYTICS_SERVICE_URL: "http://analytics-service:8084"
  AI_SERVICE_URL: "http://ai-service:8085"
  LOG_LEVEL: "INFO"
