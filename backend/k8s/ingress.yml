apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fitness-tracker-ingress
  namespace: fitness-tracker
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Rate limiting at Nginx level (in addition to Gateway-level Redis rate limiting)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.fitnesstracker.dev  # Replace with your actual domain
      secretName: fitness-tracker-tls  # Created via cert-manager or manually
  rules:
    - host: api.fitnesstracker.dev
      http:
        paths:
          # All traffic routes to the gateway — it handles internal routing
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
