# Monolith application properties

server.port=8080
spring.application.name=monolith-service

# PostgreSQL Database - Use H2 as fallback
spring.datasource.url=${DB_URL:jdbc:h2:mem:fitnessdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Redis Configuration - Make optional
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:6379}

# MongoDB - Make optional
spring.data.mongodb.uri=${MONGODB_URI:}

# Security / JWT
jwt.secret=${JWT_SECRET:TestSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmCI}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Groq API Configuration - Make optional
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.key=${GROQ_API_KEY:test_key_for_development}
groq.api.model=${GROQ_API_MODEL:llama3-8b-8192}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.fitnesstracker=DEBUG
logging.level.org.springframework.security=INFO

# Spring Boot Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# CORS Configuration
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,https://fitness-tracker-full-stack-applicat.vercel.app}
