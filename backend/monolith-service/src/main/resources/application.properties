server.port=${PORT:8080}
spring.application.name=monolith-service

# ─── Database ────────────────────────────────────────────────────────────────
# Uses DB_URL env var → Neon.tech PostgreSQL in prod, H2 locally if not set
spring.datasource.url=${DB_URL:jdbc:h2:mem:fitnessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Connection pool tuning for Neon.tech cold starts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ─── H2 Console (dev only) ───────────────────────────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ─── Data Seeding ────────────────────────────────────────────────────────────
# Seeds the foods table with Indian dishes if it's empty (safe to always run)
spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.jpa.defer-datasource-initialization=true

# ─── Auto-configure Exclusions ───────────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoReactiveDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration

# ─── Caffeine Cache ──────────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# ─── JWT Configuration ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ChangeThisToASecretThatIsAtLeast32BytesLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Groq AI Configuration ───────────────────────────────────────────────────
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama-3.1-8b-instant}

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# ─── CORS ────────────────────────────────────────────────────────────────────
ALLOWED_ORIGINS=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ─── Railway: Forward headers from proxy ─────────────────────────────────────
server.forward-headers-strategy=framework

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.fitnesstracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
