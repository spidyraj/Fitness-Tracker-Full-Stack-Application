server.port=8080
spring.application.name=monolith-service
 
# ─── Database ────────────────────────────────────────────────────────────────
# Auto-selects PostgreSQL when DB_URL env var is set, falls back to H2 for local dev
spring.datasource.url=${DB_URL:jdbc:h2:mem:fitnessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
 
# Driver detection: PostgreSQL if DB_URL contains 'postgresql', else H2
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
 
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
 
# H2 console — only for local dev (disable in prod via SPRING_H2_CONSOLE_ENABLED=false)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
 
# ─── Redis — completely disabled (opt-in via env) ─────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration
 
# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ChangeThisToASecretThatIsAtLeast32BytesLong!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
 
# ─── Groq AI ─────────────────────────────────────────────────────────────────
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
# IMPORTANT: Set GROQ_API_KEY in your .env file. Empty string disables AI features gracefully.
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama3-8b-8192}
 
# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
 
# ─── CORS ─────────────────────────────────────────────────────────────────────
# Comma-separated list. Add your Vercel URL here for production.
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
 
# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.fitnesstracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
