# Monolith application properties

server.port=8080
spring.application.name=monolith-service

# PostgreSQL Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitness_db}
spring.datasource.username=${DB_USERNAME:fitness_user}
spring.datasource.password=${DB_PASSWORD:fitness_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# MongoDB (AI Logs)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://fitness_user:fitness_pass@localhost:27017/fitness_ai_logs?authSource=admin}

# Security / JWT
jwt.secret=${JWT_SECRET:TestSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmCI}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Groq API Configuration
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.key=${GROQ_API_KEY}
groq.api.model=llama3-8b-8192

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.fitnesstracker=DEBUG
logging.level.org.springframework.security=INFO

# Spring Boot Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
