server.port=8080
spring.application.name=monolith-service

# ─── Database — switch between H2 (local no-env) and PostgreSQL (env present) ───
spring.datasource.url=${DB_URL:jdbc:h2:mem:fitnessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Dialect auto-detected by Spring Boot — DO NOT force H2Dialect here
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Redis — make truly optional (avoids "connecting to empty string" errors) ───
spring.data.redis.host=${REDIS_HOST:}
spring.data.redis.port=${REDIS_PORT:6379}
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

# ─── MongoDB — truly optional ───
spring.autoconfigure.exclude+=\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration

# ─── JWT ───
jwt.secret=${JWT_SECRET:TestSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmCI}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ─── Groq ───
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama3-8b-8192}

# ─── Actuator ───
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ─── CORS ───
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

logging.level.com.fitnesstracker=DEBUG
logging.level.org.springframework.security=WARN
