# PostgreSQL profile — activated via: java -Dspring.profiles.active=postgresql

# ─── DataSource ──────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── HikariCP — Tuned for Neon cold starts ───────────────────────────────────
# -1 means: keep retrying initial connection indefinitely (don't fail fast)
spring.datasource.hikari.initialization-fail-timeout=-1
# 60s max wait for a connection from the pool
spring.datasource.hikari.connection-timeout=60000
# Keep pool small for Neon's free tier connection limits
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
# Neon closes idle connections — keep them alive with a heartbeat query
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# ─── JPA / DDL ───────────────────────────────────────────────────────────────
# Disable H2 console in prod
spring.h2.console.enabled=false
# Don't run data.sql against PostgreSQL
spring.sql.init.mode=never

# ─── Actuator Health ─────────────────────────────────────────────────────────
# Don't let DB health indicator block Railway's healthcheck returning 200
# The app is "up" even if DB takes a moment to connect on cold start
management.health.db.enabled=false
management.health.defaults.enabled=true
