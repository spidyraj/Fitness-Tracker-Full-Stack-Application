name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/Fitness-Tracker-Full-Stack-Application

jobs:
  # ─── Job 1: Build and Test ──────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitness_db
          POSTGRES_USER: fitness_user
          POSTGRES_PASSWORD: fitness_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create test environment file
        working-directory: backend
        run: |
          cat > .env << EOF
          DB_URL=jdbc:postgresql://localhost:5432/fitness_db
          DB_USERNAME=fitness_user
          DB_PASSWORD=fitness_pass
          JWT_SECRET=TestSecretKeyThatIsAtLeast32BytesLongForHS256AlgorithmCI
          JWT_EXPIRATION_MS=86400000
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=
          REDIS_SSL=false
          GROQ_API_KEY=test-key-ci
          MONGODB_URI=mongodb://localhost:27017/fitness_ai_logs_test
          EOF

      - name: Run unit tests
        working-directory: backend
        run: mvn test -pl monolith-service -am --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Run integration tests (Testcontainers)
        working-directory: backend
        run: mvn verify -pl monolith-service -am -Pintegration-tests --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
        # Testcontainers needs Docker — GitHub Actions runners have Docker pre-installed

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: 'backend/monolith-service/target/surefire-reports/*.xml'
          reporter: java-junit

  # ─── Job 2: Code Quality ────────────────────────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud requires full git history

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile all modules
        working-directory: backend
        run: mvn compile -pl monolith-service -am --no-transfer-progress -DskipTests

      # Uncomment and add SONAR_TOKEN secret to enable SonarCloud
      # - name: SonarCloud Analysis
      #   working-directory: backend
      #   run: mvn sonar:sonar -Dsonar.projectKey=fitness-tracker
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── Job 3: Build and Push Docker Images ────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-monolith
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/monolith-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
